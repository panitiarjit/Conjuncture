name: e-GP Tender Scrape

on:
  schedule:
    - cron: '0 1 * * *'   # 01:00 UTC = 08:00 Bangkok (UTC+7)
  workflow_dispatch:
    inputs:
      days:
        description: 'Days of history to pull (overrides default of 3)'
        required: false
      pages:
        description: 'Max pages safety ceiling (overrides default of 500)'
        required: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        env:
          FIREBASE_ADMIN_PROJECT_ID: ${{ secrets.FIREBASE_ADMIN_PROJECT_ID }}
          FIREBASE_ADMIN_CLIENT_EMAIL: ${{ secrets.FIREBASE_ADMIN_CLIENT_EMAIL }}
          FIREBASE_ADMIN_PRIVATE_KEY: ${{ secrets.FIREBASE_ADMIN_PRIVATE_KEY }}
          CAPSOLVER_API_KEY: ${{ secrets.CAPSOLVER_API_KEY }}
        run: |
          ARGS=""
          [ -n "${{ github.event.inputs.days }}" ] && ARGS="$ARGS --days ${{ github.event.inputs.days }}"
          [ -n "${{ github.event.inputs.pages }}" ] && ARGS="$ARGS --pages ${{ github.event.inputs.pages }}"
          npx ts-node --project tsconfig.scripts.json scripts/scrape-egp.ts $ARGS
