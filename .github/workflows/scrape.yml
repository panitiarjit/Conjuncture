name: e-GP Tender Scrape

on:
  schedule:
    # Run at 07:00 and 15:00 Bangkok time (UTC+7 = 00:00 and 08:00 UTC).
    - cron: '0 0,8 * * 1-5'
  workflow_dispatch:
    inputs:
      days:
        description: 'Days of history to pull (default 1)'
        required: false
        default: '1'
      pages:
        description: 'Max result pages per run (default 50)'
        required: false
        default: '50'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        env:
          FIREBASE_ADMIN_PROJECT_ID: ${{ secrets.FIREBASE_ADMIN_PROJECT_ID }}
          FIREBASE_ADMIN_CLIENT_EMAIL: ${{ secrets.FIREBASE_ADMIN_CLIENT_EMAIL }}
          FIREBASE_ADMIN_PRIVATE_KEY: ${{ secrets.FIREBASE_ADMIN_PRIVATE_KEY }}
          CAPSOLVER_API_KEY: ${{ secrets.CAPSOLVER_API_KEY }}
          SCRAPE_SECRET: ${{ secrets.SCRAPE_SECRET }}
        run: |
          npx ts-node --project tsconfig.scripts.json scripts/scrape-egp.ts \
            --days ${{ github.event.inputs.days || '1' }} \
            --pages ${{ github.event.inputs.pages || '50' }}
