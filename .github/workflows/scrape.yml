name: e-GP Tender Scrape

on:
  schedule:
    # Daily at 08:00 Bangkok (01:00 UTC) — status refresh
    - cron: '0 1 * * *'
    # Every 3rd day at 08:30 Bangkok (01:30 UTC) — fetch new listings
    - cron: '30 1 */3 * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run: "refresh", "scrape", or "both"'
        required: false
        default: 'refresh'
      days:
        description: 'Days of history to pull (scrape job only)'
        required: false
      pages:
        description: 'Max pages safety ceiling (scrape job only)'
        required: false

env:
  FIREBASE_ADMIN_PROJECT_ID: ${{ secrets.FIREBASE_ADMIN_PROJECT_ID }}
  FIREBASE_ADMIN_CLIENT_EMAIL: ${{ secrets.FIREBASE_ADMIN_CLIENT_EMAIL }}
  FIREBASE_ADMIN_PRIVATE_KEY: ${{ secrets.FIREBASE_ADMIN_PRIVATE_KEY }}
  CAPSOLVER_API_KEY: ${{ secrets.CAPSOLVER_API_KEY }}
  RESIDENTIAL_PROXY_URL: ${{ secrets.RESIDENTIAL_PROXY_URL }}
  PLAYWRIGHT_HEADLESS: 'false'

jobs:
  # ── Status refresh (runs every day) ──────────────────────────────────────
  # Reads all open/unknown tenders from Firestore, force-closes any older than
  # 180 days, and re-scrapes the last 45 days to get real open/closed status
  # from e-GP. This is what eliminates estimated statuses.
  refresh-statuses:
    runs-on: self-hosted
    timeout-minutes: 60
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 1 * * *') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'refresh' || github.event.inputs.job == 'both'))

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Write Firebase credentials file
        env:
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT_B64" | base64 -d > /tmp/firebase-sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json" >> $GITHUB_ENV

      - name: Run status refresh
        run: npx ts-node --project tsconfig.scripts.json scripts/refresh-statuses.ts

      - name: Revalidate site cache
        if: success() && env.SCRAPE_SECRET != ''
        env:
          SCRAPE_SECRET: ${{ secrets.SCRAPE_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${SITE_URL}/api/refresh-statuses" \
            -H "Authorization: Bearer ${SCRAPE_SECRET}" || true

  # ── Fetch new listings (runs every 3rd day) ───────────────────────────────
  # Fetches new procurement announcements from e-GP for the last 3 days and
  # upserts them into Firestore.
  scrape-new:
    runs-on: self-hosted
    timeout-minutes: 60
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '30 1 */3 * *') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'scrape' || github.event.inputs.job == 'both'))

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Write Firebase credentials file
        env:
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT_B64" | base64 -d > /tmp/firebase-sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json" >> $GITHUB_ENV

      - name: Run scraper
        run: |
          ARGS=""
          [ -n "${{ github.event.inputs.days }}" ] && ARGS="$ARGS --days ${{ github.event.inputs.days }}"
          [ -n "${{ github.event.inputs.pages }}" ] && ARGS="$ARGS --pages ${{ github.event.inputs.pages }}"
          npx ts-node --project tsconfig.scripts.json scripts/scrape-egp.ts $ARGS

      - name: Revalidate site cache
        if: success() && env.SCRAPE_SECRET != ''
        env:
          SCRAPE_SECRET: ${{ secrets.SCRAPE_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${SITE_URL}/api/scrape" \
            -H "Authorization: Bearer ${SCRAPE_SECRET}" || true
